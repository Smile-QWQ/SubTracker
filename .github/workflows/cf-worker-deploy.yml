name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Deploy branch'
        required: false
        default: 'feat/cf-worker'
        type: string
      name_prefix:
        description: 'Worker domain/resource prefix, default subtracker'
        required: false
        default: 'subtracker'
        type: string
      enable_r2:
        description: 'Enable R2 logo storage'
        required: false
        default: false
        type: boolean
      app_version:
        description: 'Optional app version override, for example v1.0.0'
        required: false
        type: string
  push:
    branches:
      - feat/cf-worker

concurrency:
  group: deploy-cloudflare-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.app_version }}" ]; then
            echo "value=${{ github.event.inputs.app_version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy options
        id: deploy_options
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NAME_PREFIX="${{ github.event.inputs.name_prefix }}"
            ENABLE_R2="${{ github.event.inputs.enable_r2 }}"
          else
            NAME_PREFIX="${{ vars.WORKER_NAME_PREFIX }}"
            ENABLE_R2="${{ vars.ENABLE_R2 }}"
          fi

          if [ -z "$NAME_PREFIX" ]; then
            NAME_PREFIX="subtracker"
          fi

          if [ -z "$ENABLE_R2" ]; then
            ENABLE_R2="false"
          fi

          echo "name_prefix=$NAME_PREFIX" >> "$GITHUB_OUTPUT"
          echo "enable_r2=$ENABLE_R2" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify Cloudflare secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID secrets." >&2
            exit 1
          fi

      - name: Deploy without R2
        if: steps.deploy_options.outputs.enable_r2 != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          npm run deploy:worker --
          --name-prefix ${{ steps.deploy_options.outputs.name_prefix }}
          --app-version ${{ steps.app_version.outputs.value }}

      - name: Deploy with R2
        if: steps.deploy_options.outputs.enable_r2 == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          npm run deploy:worker:r2 --
          --name-prefix ${{ steps.deploy_options.outputs.name_prefix }}
          --app-version ${{ steps.app_version.outputs.value }}
