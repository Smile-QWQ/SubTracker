name: Build and Release

on:
  pull_request:
  release:
    types:
      - published

env:
  API_IMAGE_NAME: ghcr.io/smile-qwq/subtracker-api
  WEB_IMAGE_NAME: ghcr.io/smile-qwq/subtracker-web

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_APP_VERSION: ${{ github.head_ref || github.ref_name }}
        run: npm run build

  release-metadata:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_tag.outputs.value }}

    steps:
      - name: Validate release tag
        id: release_tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.0.0, v1.0.0-beta.1, or v1.0." >&2
            exit 1
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

  release-assets:
    if: github.event_name == 'release'
    needs: release-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_APP_VERSION: ${{ needs.release-metadata.outputs.release_tag }}
        run: npm run build

      - name: Archive web dist
        run: |
          cd apps/web/dist
          zip -r ../../../subtracker-web-dist.zip .

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-metadata.outputs.release_tag }}
          files: |
            subtracker-web-dist.zip

  docker-build:
    if: github.event_name == 'release'
    needs: release-metadata
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            image_name: ghcr.io/smile-qwq/subtracker-api
            dockerfile: ./Dockerfile
            platform: linux/amd64
            platform_pair: linux-amd64
            runner: ubuntu-latest
          - image: api
            image_name: ghcr.io/smile-qwq/subtracker-api
            dockerfile: ./Dockerfile
            platform: linux/arm64
            platform_pair: linux-arm64
            runner: ubuntu-24.04-arm
          - image: web
            image_name: ghcr.io/smile-qwq/subtracker-web
            dockerfile: ./docker/web.Dockerfile
            platform: linux/amd64
            platform_pair: linux-amd64
            runner: ubuntu-latest
          - image: web
            image_name: ghcr.io/smile-qwq/subtracker-web
            dockerfile: ./docker/web.Dockerfile
            platform: linux/arm64
            platform_pair: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-metadata.outputs.release_tag }}
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            VITE_APP_VERSION=${{ needs.release-metadata.outputs.release_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/Smile-QWQ/SubTracker
            org.opencontainers.image.version=${{ needs.release-metadata.outputs.release_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform_pair }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ matrix.image_name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        shell: bash
        run: |
          mkdir -p "/tmp/digests/${{ matrix.image }}"
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform_pair }}
          path: /tmp/digests/${{ matrix.image }}/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    if: github.event_name == 'release'
    needs:
      - release-metadata
      - docker-build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            image_name: ghcr.io/smile-qwq/subtracker-api
          - image: web
            image_name: ghcr.io/smile-qwq/subtracker-web

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.release-metadata.outputs.release_tag }}
            type=sha

      - name: Create multi-architecture manifest
        shell: bash
        run: |
          cd /tmp/digests
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image_name }}@sha256:%s ' *)
